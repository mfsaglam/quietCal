<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quiet Kcal — App Icon</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --cream: #f0eee9;
    --ink: #1a1a1a;
    --sand: #e3ddd1;
    --terra: #c8422d;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --sf: -apple-system, "SF Pro Text", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream); -webkit-font-smoothing: antialiased; }
  body { font-family: var(--sf); color: var(--ink); padding: 64px clamp(28px, 6vw, 100px) 120px; }

  .head { max-width: 920px; margin: 0 auto 8px; }
  .title { font-size: 46px; font-weight: 700; letter-spacing: -1.4px; }
  .sub { font-size: 18px; color: rgba(60,50,40,0.7); margin-top: 8px; letter-spacing: -0.2px; }
  .meta { font-family: var(--mono); font-size: 11px; color: rgba(60,50,40,0.55);
          margin-top: 18px; line-height: 1.7; letter-spacing: 0.5px; text-transform: uppercase; }

  .wrap { max-width: 1120px; margin: 0 auto; }
  .sec-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
               color: rgba(60,50,40,0.5); margin: 64px 0 22px; padding-bottom: 12px;
               border-bottom: 1px solid rgba(60,50,40,0.12); }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 44px 40px; }
  @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .icon-shadow { filter: drop-shadow(0 18px 36px rgba(40,30,20,0.18)); line-height: 0; }
  .icon-shadow svg { display: block; width: 232px; height: 232px; }
  .cell .name { font-size: 14px; font-weight: 600; letter-spacing: -0.1px; }
  .cell .rec { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: 9px;
               letter-spacing: 1px; text-transform: uppercase; color: var(--terra);
               border: 1px solid rgba(200,66,45,0.4); border-radius: 5px; padding: 2px 6px; vertical-align: 2px; }
  .cell .desc { font-size: 12.5px; color: rgba(60,50,40,0.62); text-align: center; max-width: 240px;
                line-height: 1.5; margin-top: -8px; }

  /* home screen mockup */
  .home { border-radius: 44px; padding: 54px 40px 40px; overflow: hidden; position: relative;
          background: linear-gradient(160deg, #d9cfc0 0%, #c9bda9 48%, #b9ac98 100%);
          max-width: 560px; margin: 0 auto; }
  .home::after { content: ""; position: absolute; inset: 0;
          background: radial-gradient(circle at 26% 18%, rgba(255,255,255,0.28), transparent 46%),
                      radial-gradient(circle at 82% 88%, rgba(40,30,20,0.14), transparent 50%); }
  .home-grid { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px 26px; }
  .app { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .app .icn { width: 100%; aspect-ratio: 1; border-radius: 23%; overflow: hidden; line-height: 0;
              box-shadow: 0 6px 14px rgba(30,20,10,0.22); }
  .app .icn svg { width: 100%; height: 100%; display: block; }
  .app .lab { font-size: 12px; color: #2c2418; font-weight: 500; letter-spacing: -0.1px;
              text-shadow: 0 1px 2px rgba(255,255,255,0.35); }
  .app.placeholder .icn { background: rgba(255,255,255,0.32); box-shadow: 0 6px 14px rgba(30,20,10,0.14); }
  .app.placeholder .lab { color: rgba(44,36,24,0.7); }

  .footnote { font-family: var(--mono); font-size: 10.5px; color: rgba(60,50,40,0.5);
              text-align: center; margin-top: 26px; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <div class="head">
    <div class="title">Quiet Kcal — App Icon</div>
    <div class="sub">Built on the signature calorie ring. Calm, single-idea, legible at any size.</div>
    <div class="meta">1024 × 1024 master · iOS continuous-corner squircle · pick a direction & I'll refine</div>
  </div>

  <div class="wrap">
    <div class="sec-label">Directions</div>
    <div class="grid" id="grid"></div>

    <div class="sec-label">On the home screen — does it hold up small?</div>
    <div class="home">
      <div class="home-grid" id="home"></div>
    </div>
    <div class="footnote">faux wallpaper · icons shown at true home-screen scale</div>
  </div>

<script>
const CREAM = "#f0eee9", INK = "#1a1a1a", SAND = "#e6e0d4", TERRA = "#c8422d";
const PROG = 0.62; // matches the app's default ring progress

// continuous-corner squircle (superellipse) path, n≈5 ≈ iOS
function squircle(s, n){
  const a = s/2, c = s/2, N = 240; let d = "";
  for (let i=0;i<=N;i++){
    const t = (i/N)*2*Math.PI;
    const ct = Math.cos(t), st = Math.sin(t);
    const x = c + a*Math.sign(ct)*Math.pow(Math.abs(ct), 2/n);
    const y = c + a*Math.sign(st)*Math.pow(Math.abs(st), 2/n);
    d += (i===0?"M":"L") + x.toFixed(2) + " " + y.toFixed(2) + " ";
  }
  return d + "Z";
}

// build an icon SVG. opts: {bg, ring, track, prog, dot, q, gauge, double, capRound}
function icon(o){
  const S = 1024, cx = S/2, cy = S/2;
  const bg = o.bg, ring = o.ring;
  const track = o.track || "rgba(0,0,0,0.08)";
  const prog = o.prog ?? PROG;
  const sq = squircle(S, 5);

  // ring geometry
  const r = o.r ?? 300;
  const sw = o.sw ?? 88;
  const circ = 2*Math.PI*r;
  const startDeg = o.gauge ? 135 : -90;      // gauge starts lower-left
  const sweep = o.gauge ? 270 : 360;          // gauge is 270° track
  const trackDash = o.gauge ? `${circ*(sweep/360)} ${circ}` : null;
  const progDash = `${circ*prog*(sweep/360)} ${circ}`;
  const rot = `rotate(${startDeg} ${cx} ${cy})`;

  // progress-head dot
  let dotEl = "";
  if (o.dot){
    const ang = (startDeg + prog*sweep) * Math.PI/180;
    const dx = cx + r*Math.cos(ang), dy = cy + r*Math.sin(ang);
    dotEl = `<circle cx="${dx.toFixed(1)}" cy="${dy.toFixed(1)}" r="${(sw*0.34).toFixed(1)}" fill="${o.dotColor||TERRA}"/>`;
  }

  // second concentric ring
  let doubleEl = "";
  if (o.double){
    const r2 = r - sw - 34, sw2 = sw*0.5, circ2 = 2*Math.PI*r2;
    doubleEl = `
      <circle cx="${cx}" cy="${cy}" r="${r2}" stroke="${track}" stroke-width="${sw2}" fill="none"/>
      <circle cx="${cx}" cy="${cy}" r="${r2}" stroke="${ring}" stroke-width="${sw2}" fill="none"
        stroke-linecap="round" stroke-dasharray="${circ2*0.84} ${circ2}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
  }

  // Q tail — short rounded stroke crossing the ring at ~318°
  let qEl = "";
  if (o.q){
    const a = 318*Math.PI/180;
    const inr = r - sw*0.65, outr = r + sw*0.65;
    const x1 = cx + inr*Math.cos(a), y1 = cy + inr*Math.sin(a);
    const x2 = cx + outr*Math.cos(a), y2 = cy + outr*Math.sin(a);
    qEl = `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
      stroke="${ring}" stroke-width="${sw*0.78}" stroke-linecap="round"/>`;
  }

  return `<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
    <path d="${sq}" fill="${bg}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" stroke="${track}" stroke-width="${sw}" fill="none"
      ${trackDash?`stroke-linecap="round" stroke-dasharray="${trackDash}" transform="${rot}"`:""}/>
    <circle cx="${cx}" cy="${cy}" r="${r}" stroke="${ring}" stroke-width="${sw}" fill="none"
      stroke-linecap="round" stroke-dasharray="${progDash}" transform="${rot}"/>
    ${qEl}${doubleEl}${dotEl}
  </svg>`;
}

const DIRECTIONS = [
  { key:"ink", name:"Ring · Ink", rec:true,
    desc:"Cream ring glowing on warm ink. Premium, quiet, unmistakably the brand.",
    opts:{ bg:INK, ring:CREAM, track:"rgba(255,255,255,0.10)" } },
  { key:"cream", name:"Ring · Cream",
    desc:"Ink ring on warm cream. Lighter and friendlier; matches the app surface.",
    opts:{ bg:CREAM, ring:INK, track:"rgba(40,30,20,0.09)" } },
  { key:"dot", name:"Progress dot",
    desc:"Cream ring with a terracotta head — one spark of warmth at the leading edge.",
    opts:{ bg:INK, ring:CREAM, track:"rgba(255,255,255,0.10)", dot:true } },
  { key:"q", name:"Q-ring",
    desc:"A subtle tail turns the ring into a 'Q' for Quiet — a quiet wordmark tie-in.",
    opts:{ bg:INK, ring:CREAM, track:"rgba(255,255,255,0.10)", q:true } },
  { key:"gauge", name:"Gauge",
    desc:"A 270° gauge reads as 'tracking toward a target' more than a closed loop.",
    opts:{ bg:CREAM, ring:INK, track:"rgba(40,30,20,0.10)", gauge:true } },
  { key:"sand", name:"Ring · Sand",
    desc:"Ink ring on warm sand — a softer mid-tone alternative to pure cream.",
    opts:{ bg:SAND, ring:INK, track:"rgba(40,30,20,0.09)" } },
];

const grid = document.getElementById("grid");
DIRECTIONS.forEach(d => {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.innerHTML = `
    <div class="icon-shadow">${icon(d.opts)}</div>
    <div class="name">${d.name}${d.rec?'<span class="rec">Recommended</span>':''}</div>
    <div class="desc">${d.desc}</div>`;
  grid.appendChild(cell);
});

// home screen: a few real apps (placeholders) + our candidates at icon scale
const home = document.getElementById("home");
const homeApps = [
  { type:"ph" }, { type:"ph" }, { type:"ph" }, { type:"ph" },
  { type:"icon", k:"ink",  lab:"Quiet Kcal" },
  { type:"icon", k:"cream", lab:"Quiet Kcal" },
  { type:"icon", k:"dot",  lab:"Quiet Kcal" },
  { type:"icon", k:"gauge", lab:"Quiet Kcal" },
];
homeApps.forEach(a => {
  const el = document.createElement("div");
  if (a.type === "ph"){
    el.className = "app placeholder";
    el.innerHTML = `<div class="icn"></div><div class="lab">&nbsp;</div>`;
  } else {
    const d = DIRECTIONS.find(x => x.key === a.k);
    el.className = "app";
    el.innerHTML = `<div class="icn">${icon(d.opts)}</div><div class="lab">${a.lab}</div>`;
  }
  home.appendChild(el);
});
</script>
</body>
</html>
