<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quiet Kcal — Hi-Fi</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="hifi-screens.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>

<script type="text/babel">
function App() {
  const initial = /*EDITMODE-BEGIN*/{
    "accent": "ink",
    "theme": "light",
    "ringProgress": 62
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = React.useState(initial);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  const dark = tweaks.theme === 'dark';

  // Wrap each screen in IOSDevice
  const Device = ({ children, label }) => (
    <div style={{ position: 'relative' }}>
      {label && (
        <div style={{
          position: 'absolute', bottom: '100%', left: 0, paddingBottom: 10,
          fontFamily: '-apple-system, system-ui', fontSize: 12, fontWeight: 500,
          color: 'rgba(60,50,40,0.7)', letterSpacing: 0.5, textTransform: 'uppercase',
          whiteSpace: 'nowrap',
        }}>{label}</div>
      )}
      <IOSDevice dark={dark} width={402} height={874}>
        {children}
      </IOSDevice>
    </div>
  );

  return (
    <>
      <DesignCanvas>
        {/* Title */}
        <div style={{ padding: '0 60px 40px', maxWidth: 900 }}>
          <div style={{
            fontFamily: '-apple-system, system-ui', fontSize: 44, fontWeight: 700,
            color: '#1a1a1a', letterSpacing: -1,
          }}>Quiet Kcal</div>
          <div style={{
            fontFamily: '-apple-system, system-ui', fontSize: 18,
            color: 'rgba(60,50,40,0.7)', marginTop: 6, letterSpacing: -0.2,
          }}>Hi-fi · iOS 26 · calm minimal calorie tracking</div>
          <div style={{
            fontFamily: '"JetBrains Mono", monospace', fontSize: 11, color: 'rgba(60,50,40,0.55)',
            marginTop: 16, lineHeight: 1.6, letterSpacing: 0.5,
          }}>
            RING HOME · ADD-MEAL SHEET · HISTORY · SETTINGS · EDIT TARGET<br/>
            SF PRO · 402×874 · LIGHT/DARK VIA TWEAKS
          </div>
        </div>

        {/* Home states */}
        <DCSection title="Home" subtitle="Ring progress · default and over-target" gap={56}>
          <DCArtboard label="Today · under target" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <div style={{ position: 'relative' }}>
              <Device><HifiHome dark={dark} /></Device>
              <HifiFAB dark={dark} />
            </div>
          </DCArtboard>
          <DCArtboard label="Today · over target" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <div style={{ position: 'relative' }}>
              <Device><HifiHome over dark={dark} /></Device>
              <HifiFAB dark={dark} />
            </div>
          </DCArtboard>
        </DCSection>

        {/* Add meal */}
        <DCSection title="Add a meal" subtitle="Apple Intelligence estimates calories from name + amount" gap={56}>
          <DCArtboard label="1 · Typing name" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiAddMeal dark={dark} state="empty" /></Device>
          </DCArtboard>
          <DCArtboard label="2 · Estimating…" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiAddMeal dark={dark} state="estimating" /></Device>
          </DCArtboard>
          <DCArtboard label="3 · Estimated · ready to save" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiAddMeal dark={dark} state="estimated" /></Device>
          </DCArtboard>
        </DCSection>

        {/* History & settings */}
        <DCSection title="History · Settings · Edit target" subtitle="" gap={56}>
          <DCArtboard label="History" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiHistory dark={dark} /></Device>
          </DCArtboard>
          <DCArtboard label="Settings" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiSettings dark={dark} /></Device>
          </DCArtboard>
          <DCArtboard label="Edit target" width={402} height={874} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 48 }}>
            <Device><HifiEditTarget dark={dark} /></Device>
          </DCArtboard>
        </DCSection>

        {/* Widgets */}
        <DCSection title="Widgets" subtitle="Home screen ring · medium with quick log · lock screen complications" gap={48}>
          <DCArtboard label="Small · Home screen" width={210} height={210} style={{ background: '#E8E4DC', boxShadow: 'none', borderRadius: 28, padding: 26, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WidgetSmall dark={dark} />
          </DCArtboard>
          <DCArtboard label="Small · Over target" width={210} height={210} style={{ background: '#E8E4DC', boxShadow: 'none', borderRadius: 28, padding: 26, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WidgetSmall dark={dark} over />
          </DCArtboard>
          <DCArtboard label="Medium · Quick log meal" width={386} height={210} style={{ background: '#E8E4DC', boxShadow: 'none', borderRadius: 28, padding: 26, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WidgetMedium dark={dark} />
          </DCArtboard>
          <DCArtboard label="Lock screen complications" width={400} height={240} style={{ background: 'transparent', boxShadow: 'none', borderRadius: 28, padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <LockBg w={400} h={240}>
              <WidgetLockCircular />
              <WidgetLockRect />
            </LockBg>
          </DCArtboard>
        </DCSection>

        <div style={{ height: 80 }} />
      </DesignCanvas>

      {editMode && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, width: 260,
          background: '#fff', borderRadius: 14, padding: 16,
          boxShadow: '0 10px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.08)',
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          zIndex: 1000,
        }}>
          <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>Tweaks</div>

          <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 1, color: '#888', marginBottom: 6 }}>Theme</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['light', 'dark'].map(t => (
              <button key={t} onClick={() => update({ theme: t })} style={{
                flex: 1, padding: '6px 8px', borderRadius: 6, border: '1px solid #ddd',
                background: tweaks.theme === t ? '#1a1a1a' : '#fff',
                color: tweaks.theme === t ? '#fff' : '#1a1a1a',
                fontSize: 12, cursor: 'pointer', textTransform: 'capitalize',
              }}>{t}</button>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
